<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Meter Hilang 2026 RHINOCEROS</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <h1>DASHBOARD METER HILANG 2026</h1>
        <p>RHINOCEROS</p>
    </header>

    <main class="dashboard">

        <!-- BARIS ATAS -->
        <section class="top-row">

            <div class="card total-card">
                <h2>Total Meter Hilang</h2>
                <div class="big-number">0</div>
            </div>

            <div class="card map-card">
                <h2>Peta Zona Surabaya</h2>

                <div class="map-wrapper">
                    <img src="imeges/peta-zona-surabaya.png" alt="Peta Zona Surabaya">
                </div>
            </div>

            <div class="card alarm-card">
                <h2>Alarm Meter Hilang</h2>

                <div class="alarm-placeholder">
                    Belum ada laporan
                </div>
            </div>

        </section>

        <!-- GRAFIK -->
        <section class="card chart-card">
            <h2>Diagram Batang Meter Hilang Per Zona</h2>

            <div class="placeholder">
                Area Grafik
            </div>
        </section>

        <!-- BARIS BAWAH -->
        <section class="bottom-row">

            <div class="card summary-card">
                <h2>Ringkasan Per Zona</h2>

                <div class="placeholder">
                    Data Zona
                </div>
            </div>

            <div class="card latest-card">
                <h2>Meter Hilang Terbaru</h2>

                <div class="placeholder">
                    Belum ada data
                </div>
            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
