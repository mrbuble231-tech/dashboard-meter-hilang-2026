<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Meter Hilang 2026</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <h1>DASHBOARD METER HILANG 2026</h1>
    <h2>RHINOCEROS</h2>
</div>

<div class="container">

    <div class="left-panel">

        <div class="card">
            <h3>Total Meter Hilang</h3>
            <span id="totalMH">0</span>
        </div>

        <div class="card">
            <h3>Sudah Terpasang</h3>
            <span id="selesai">0</span>
        </div>

        <div class="card">
            <h3>Belum Terpasang</h3>
            <span id="belum">0</span>
        </div>

    </div>


 <div class="map-panel">

    <img src="images/peta-zona-surabaya.png" class="map">

<div class="progress-ring zona1">
    <div class="outer-circle ungu">
        <div class="inner-circle">
            <span id="p1">87%</span>
        </div>
    </div>
</div>

<div class="progress-ring zona2">
    <div class="outer-circle orange">
        <div class="inner-circle">
            <span id="p2">75%</span>
        </div>
    </div>
</div>

<div class="progress-ring zona3">
    <div class="outer-circle biru">
        <div class="inner-circle">
            <span id="p3">93%</span>
        </div>
    </div>
</div>

<div class="progress-ring zona4">
    <div class="outer-circle merah">
        <div class="inner-circle">
            <span id="p4">68%</span>
        </div>
    </div>
</div>

<div class="progress-ring zona5">
    <div class="outer-circle hijau">
        <div class="inner-circle">
            <span id="p5">81%</span>
        </div>
    </div>
</div>
</div>



<script src="script.js"></script>

</body>
</html>
